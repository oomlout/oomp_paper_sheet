oomlout_ai_roboclick_2:
    actions:
    -   command: new_chat
        description: step_2_create_image_chibi
    -   command: ai_query
        delay: '120'
        mode_ai_wait: slow
        text: 'This is a context-loading and exploration step for a fun chibi CGI-inspired
            illustration. Take your time and think expansively before answering. Explore
            multiple character directions, toy-like proportions, expressive poses,
            surface treatments, prop ideas, and composition approaches, then explain
            what will make the final image cutest, clearest, and most polished. The
            goal here is to develop a premium, lovable, highly readable image direction
            before the final render is generated.


            Creative direction:

            - Invent one central chibi character concept based on the theme, but push
            beyond generic stock mascot art. The character should feel specific, playful,
            and emotionally appealing.

            - Favor oversized head proportions, small expressive limbs, simple hands,
            bright eyes, a sweet face, and an instantly readable silhouette.

            - Aim for a polished CGI or high-end 3D illustration feel: smooth forms,
            soft rounded edges, tactile materials, subtle reflections, and the charm
            of a carefully art-directed animated collectible.

            - Supporting props are encouraged when they help the image read faster
            or add a small story beat, but avoid clutter.

            - Look for ways to make the character feel huggable, friendly, and slightly
            mischievous in a warm, fun way.

            - Keep the styling cohesive so the face, body, props, clothing, markings,
            and materials all feel like one intentional design system.

            - Search for the version that feels cutest after simplification rather
            than the one with the most detail.

            - Favor a centered hero composition that reads well immediately.


            Image constraints:

            - Full-color image is allowed and encouraged.

            - Prefer a simple, clean background or soft studio-style setting that
            keeps the character as the clear focus.

            - Avoid busy scenery, tiny unreadable details, muddy textures, harsh shadows,
            or photoreal grit.

            - Keep the composition readable at thumbnail size with clear separation
            between major forms.

            - Favor soft lighting, clean specular highlights, and material contrast
            that helps the image feel premium without becoming noisy.

            - Avoid creepy facial proportions, aggressive expressions, or overly realistic
            anatomy.

            - No text unless it is absolutely essential to the design concept.


            What to include in your response:

            - Several candidate chibi directions for the theme, with notes on why
            each could work.

            - Observations about silhouette clarity, proportions, pose readability,
            color/material opportunities, and overall cuteness.

            - Notes on what details should be simplified, enlarged, grouped, or removed
            to keep the result strong.

            - Suggestions for props, accessories, clothing cues, or supporting motifs
            only where they genuinely improve the idea.

            - Observations about what makes the image feel like a polished CGI render
            rather than a flat illustration.

            - A recommended direction, with an explanation of why it is strongest.

            - One strong final image-generation prompt at the end, ready for later
            use.


            Response style:

            - Explain your reasoning clearly and include all useful detail.

            - Use structure, comparisons, and short sections when that helps clarity.

            - The final prompt should explicitly call for a fun chibi CGI-inspired
            image with a polished, premium result.


            Take this context and research and search and make extra decisions based
            on your findings tell me all about them!'
    -   command: ai_query
        delay: '120'
        mode_ai_wait: slow
        text: 'Now use the exploration work to develop the direction for this theme:
            a fun chibi CGI inspired picture of paper sheet a4 160 gsm blue colour
            kingfisher blue colorit 387 969 make it cute


            Take your time and search outward before narrowing down. Explore multiple
            character interpretations, facial expressions, prop choices, costumes
            or markings, color families, pose options, and CGI material treatments.
            Compare what becomes more memorable, cuter, clearer, and more emotionally
            engaging as the idea develops. Make the character feel more specific and
            lovable than the theme name alone.


            What to do:

            - Explore a healthy range of possible chibi directions, not just the first
            obvious one.

            - Search for character ideas that feel unique to the theme rather than
            generic cute branding.

            - Compare different head-to-body ratios, pose choices, facial expressions,
            and gesture ideas.

            - Compare different prop and accessory choices that reinforce the theme
            without clutter.

            - Discuss what helps or hurts the silhouette at small size.

            - Surface tradeoffs between charm, clarity, detail, polish, and simplicity.

            - Favor rounded forms, clean separation of shapes, and a pose that feels
            alive.

            - Favor material ideas that support a premium CGI feel: glossy plastic,
            satin fabric, rubber accents, soft translucent elements, brushed metal
            highlights, or similar carefully chosen surfaces where appropriate.

            - Keep the mood joyful, warm, playful, and inviting.

            - Recommend the strongest direction only after the exploration feels well
            developed.

            - End with one polished final image-generation prompt paragraph for the
            recommended direction.


            Response style:

            - Explain everything that seems useful for the next step.

            - It is good to be expansive here; do not compress the thinking prematurely.

            - Structured notes, comparisons, bullets, and short sections are welcome
            if they help clarity.

            - The final prompt should explicitly call for a clean, polished CGI-style
            chibi render with the theme centered clearly.

            '
    -   command: ai_query
        delay: '120'
        mode_ai_wait: slow
        text: Generate the image take all the time you need
    -   command: save_image_generated
